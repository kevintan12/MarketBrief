<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#0f172a">
    <title>MarketBrief</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0f172a; --card: #1e293b; --accent: #38bdf8;
            --text: #f1f5f9; --muted: #94a3b8; --up: #10b981; --down: #ef4444;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); padding: 16px; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .card { background: var(--card); border-radius: 12px; padding: 20px; margin-bottom: 16px; border: 1px solid #334155; }
        .price { font-size: 2.5rem; font-weight: 700; font-family: 'JetBrains Mono', monospace; }
        .change { font-size: 1.1rem; margin-top: 4px; font-weight: 600; }
        .controls { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 16px; }
        input, select, button { 
            background: #334155; border: none; padding: 12px; border-radius: 8px; 
            color: white; font-size: 14px; width: 100%;
        }
        button { background: var(--accent); color: #0f172a; font-weight: 700; cursor: pointer; }
        .ai-box { background: rgba(56, 189, 248, 0.1); border-left: 4px solid var(--accent); padding: 12px; font-size: 14px; line-height: 1.5; }
        .label { color: var(--muted); font-size: 12px; text-transform: uppercase; margin-bottom: 4px; }
    </style>
</head>
<body>

    <div class="header">
        <h2 style="font-family: 'JetBrains Mono'">MarketBrief</h2>
        <span id="clock" style="font-size: 12px; color: var(--muted);"></span>
    </div>

    <div class="controls">
        <select id="market">
            <option value="US">US Market</option>
            <option value="SG">Singapore (SGX)</option>
            <option value="HK">Hong Kong (HKEX)</option>
        </select>
        <input type="text" id="symbol" placeholder="Symbol (e.g. D05 or AAPL)">
    </div>
    <button onclick="refreshData()" style="margin-bottom: 16px;">Refresh Summary</button>

    <div class="card" id="main-quote">
        <div class="label" id="stock-name">Waiting for input...</div>
        <div class="price" id="curr-price">--.--</div>
        <div class="change" id="curr-change">--.-- (--%)</div>
    </div>

    <div id="ai-container" style="display: none;">
        <div class="label">AI Market Analysis</div>
        <div class="ai-box" id="ai-text">Analyzing market trends...</div>
    </div>

    <div style="margin-top: 20px;">
        <input type="password" id="api-key" placeholder="Enter API Key (Alpha Vantage/Claude)" style="font-size: 10px;">
        <p style="font-size: 10px; color: var(--muted); margin-top: 8px;">*Data powered by Alpha Vantage & Anthropic</p>
    </div>

<script>
    async function refreshData() {
        const market = document.getElementById('market').value;
        let symbol = document.getElementById('symbol').value.toUpperCase();
        const apiKey = document.getElementById('api-key').value;
        
        if (!symbol || !apiKey) return alert("Please enter symbol and API Key");

        // Apply Exchange Suffixes for Alpha Vantage
        if (market === "SG") symbol += ".SI";
        if (market === "HK") symbol += ".HK";

        const url = `https://www.alphavantage.co/query?function=GLOBAL_QUOTE&symbol=${symbol}&apikey=${apiKey}`;
        
        try {
            const resp = await fetch(url);
            const data = await resp.json();
            const quote = data["Global Quote"];

            if (!quote || Object.keys(quote).length === 0) {
                alert("Stock not found. Check symbol/market.");
                return;
            }

            // Update UI
            document.getElementById('stock-name').innerText = `${symbol} Market Status`;
            document.getElementById('curr-price').innerText = Number(quote["05. price"]).toFixed(2);
            
            const change = Number(quote["09. change"]);
            const changePct = quote["10. change percent"];
            const color = change >= 0 ? 'var(--up)' : 'var(--down)';
            
            document.getElementById('curr-change').innerText = `${change >= 0 ? '+' : ''}${change.toFixed(2)} (${changePct})`;
            document.getElementById('curr-change').style.color = color;

            // Trigger AI Summary (Claude)
            generateAISummary(quote, apiKey);
        } catch (e) {
            console.error(e);
        }
    }

    async function generateAISummary(q, key) {
        const container = document.getElementById('ai-container');
        const aiText = document.getElementById('ai-text');
        container.style.display = 'block';
        aiText.innerText = "Analyzing what happened yesterday...";

        const prompt = `Summarize what happened yesterday for stock ${q["01. symbol"]}. Price is ${q["05. price"]} with a change of ${q["10. change percent"]}. Identify one likely catalyst and one implication for a Singapore resident investor. Max 2 sentences.`;

        try {
            const resp = await fetch('https://api.anthropic.com/v1/messages', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'x-api-key': key,
                    'anthropic-version': '2023-06-01',
                    'anthropic-dangerous-direct-browser-access': 'true'
                },
                body: JSON.stringify({
                    model: 'claude-3-haiku-20240307',
                    max_tokens: 150,
                    messages: [{ role: 'user', content: prompt }]
                })
            });
            const result = await resp.json();
            aiText.innerText = result.content[0].text;
        } catch (e) {
            aiText.innerText = "Summary unavailable. Check your Anthropic API credit balance.";
        }
    }

    setInterval(() => {
        document.getElementById('clock').innerText = new Date().toLocaleString();
    }, 1000);
</script>
</body>
</html>
