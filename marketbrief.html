<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MarketBrief (Alpha Vantage Edition)</title>
    <style>
        :root {
            --bg: #0f172a; --card: #1e293b; --accent: #38bdf8;
            --text: #f1f5f9; --muted: #94a3b8; --up: #10b981; --down: #ef4444;
        }
        body { font-family: sans-serif; background: var(--bg); color: var(--text); padding: 20px; }
        .card { background: var(--card); border-radius: 12px; padding: 20px; margin-bottom: 16px; border: 1px solid #334155; }
        .price { font-size: 2.5rem; font-weight: 700; }
        .controls { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 16px; }
        input, select, button { 
            background: #334155; border: 1px solid #475569; padding: 12px; border-radius: 8px; 
            color: white; font-size: 16px; width: 100%;
        }
        button { background: var(--accent); color: #0f172a; font-weight: 700; border: none; }
        .ai-box { background: rgba(56, 189, 248, 0.1); border-left: 4px solid var(--accent); padding: 15px; font-size: 14px; line-height: 1.6; }
        .status { font-size: 12px; color: var(--muted); margin-top: 10px; text-align: center; }
    </style>
</head>
<body>

    <h2 style="margin-bottom: 20px;">MarketBrief</h2>

    <div class="controls">
        <select id="market">
            <option value="US">US Market</option>
            <option value="SG">Singapore (SGX)</option>
            <option value="HK">Hong Kong (HKEX)</option>
        </select>
        <input type="text" id="symbol" placeholder="AAPL or D05">
    </div>

    <button onclick="getSummary()">Get Yesterday's Summary</button>
    <div id="status" class="status">Enter keys below to start</div>

    <div class="card" id="result-card" style="display:none; margin-top:20px;">
        <div id="res-sym" style="font-size: 12px; color: var(--muted); text-transform: uppercase;"></div>
        <div id="res-price" class="price">--.--</div>
        <div id="res-change" style="font-weight: bold; margin-bottom: 15px;">--.-- (--%)</div>
        <div id="ai-output" class="ai-box">Analyzing market data...</div>
    </div>

    <div style="margin-top: 30px; border-top: 1px solid #334155; pt: 20px;">
        <p style="font-size: 11px; color: var(--muted); margin-bottom: 5px;">API SETTINGS</p>
        <input type="password" id="av-key" placeholder="Alpha Vantage API Key" style="margin-bottom: 8px;">
        <input type="password" id="cl-key" placeholder="Claude API Key">
    </div>

<script>
    async function getSummary() {
        const mkt = document.getElementById('market').value;
        const sym = document.getElementById('symbol').value.toUpperCase();
        const avKey = document.getElementById('av-key').value;
        const clKey = document.getElementById('cl-key').value;
        const status = document.getElementById('status');

        if (!sym || !avKey) return alert("Missing Ticker or Alpha Vantage Key");

        status.innerText = "Fetching data...";
        
        let fullSym = sym;
        if (mkt === "SG") fullSym += ".SI";
        if (mkt === "HK") fullSym += ".HK";

        try {
            const url = `https://www.alphavantage.co/query?function=GLOBAL_QUOTE&symbol=${fullSym}&apikey=${avKey}`;
            const resp = await fetch(url);
            const data = await resp.json();
            const q = data["Global Quote"];

            if (!q || !q["05. price"]) {
                status.innerText = "Error: Stock not found or API limit reached.";
                return;
            }

            document.getElementById('result-card').style.display = 'block';
            document.getElementById('res-sym').innerText = fullSym;
            document.getElementById('res-price').innerText = Number(q["05. price"]).toFixed(2);
            
            const chg = Number(q["09. change"]);
            const pct = q["10. change percent"];
            const elChg = document.getElementById('res-change');
            elChg.innerText = `${chg >= 0 ? '+' : ''}${chg.toFixed(2)} (${pct})`;
            elChg.style.color = chg >= 0 ? 'var(--up)' : 'var(--down)';

            if (clKey) {
                status.innerText = "Generating AI Insight...";
                const aiPrompt = `Summarize yesterday's action for ${fullSym}. Close: ${q["05. price"]} (${pct}). Mention one driver and one tip for a Singapore investor. 2 sentences.`;
                
                const aiResp = await fetch('https://api.anthropic.com/v1/messages', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'x-api-key': clKey,
                        'anthropic-version': '2023-06-01',
                        'anthropic-dangerous-direct-browser-access': 'true'
                    },
                    body: JSON.stringify({
                        model: 'claude-3-haiku-20240307',
                        max_tokens: 150,
                        messages: [{ role: 'user', content: aiPrompt }]
                    })
                });
                const aiData = await aiResp.json();
                document.getElementById('ai-output').innerText = aiData.content[0].text;
            }
            status.innerText = "Update complete.";
        } catch (e) {
            status.innerText = "Connection error.";
        }
    }
</script>
</body>
</html>
