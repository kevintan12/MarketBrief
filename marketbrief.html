<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="mobile-web-app-capable" content="yes">
    <title>MarketBrief v2</title>
    <style>
        :root {
            --bg: #0a0f1e; --card: #111827; --accent: #00d4ff;
            --text: #e2e8f0; --muted: #64748b; --up: #10b981; --down: #ef4444;
        }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: var(--bg); color: var(--text); padding: 20px; margin: 0; }
        .card { background: var(--card); border-radius: 16px; padding: 24px; border: 1px solid #1e2d45; margin-bottom: 16px; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.5); }
        .symbol-label { font-size: 12px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; }
        .price { font-size: 3rem; font-weight: 800; letter-spacing: -1px; margin-bottom: 4px; }
        .change { font-size: 1.2rem; font-weight: 600; }
        .input-group { display: flex; gap: 8px; margin-bottom: 12px; }
        select, input { background: #1a2236; border: 1px solid #1e2d45; color: white; padding: 12px; border-radius: 8px; flex: 1; font-size: 16px; }
        button { width: 100%; background: var(--accent); color: #0a0f1e; border: none; padding: 14px; border-radius: 8px; font-weight: 700; font-size: 16px; cursor: pointer; transition: opacity 0.2s; }
        button:active { opacity: 0.7; }
        .ai-section { margin-top: 20px; border-top: 1px solid #1e2d45; padding-top: 20px; }
        .ai-badge { background: rgba(0, 212, 255, 0.1); color: var(--accent); padding: 4px 8px; border-radius: 4px; font-size: 10px; font-weight: 700; display: inline-block; margin-bottom: 10px; }
        .ai-text { font-size: 14px; line-height: 1.6; color: #94a3b8; font-style: italic; }
        #status { font-size: 11px; color: var(--muted); text-align: center; margin-top: 10px; }
    </style>
</head>
<body>

    <div class="card">
        <div class="input-group">
            <select id="market">
                <option value="US">US Market</option>
                <option value="SG">Singapore (SGX)</option>
                <option value="HK">Hong Kong (HKEX)</option>
            </select>
            <input type="text" id="symbol" placeholder="D05 or AAPL" autocomplete="off">
        </div>
        <button onclick="fetchMarketData()">Get Yesterday's Summary</button>
        <div id="status">Ready</div>
    </div>

    <div class="card" id="display-card" style="display: none;">
        <div class="symbol-label" id="disp-symbol">---</div>
        <div class="price" id="disp-price">0.00</div>
        <div class="change" id="disp-change">0.00 (0.00%)</div>
        
        <div class="ai-section" id="ai-wrap" style="display: none;">
            <div class="ai-badge">AI INSIGHT</div>
            <div class="ai-text" id="disp-ai">Analyzing trends...</div>
        </div>
    </div>

    <div style="padding: 0 10px;">
        <input type="password" id="av-key" placeholder="Alpha Vantage API Key" style="font-size: 12px; margin-bottom: 8px;">
        <input type="password" id="cl-key" placeholder="Claude API Key" style="font-size: 12px;">
    </div>

<script>
    async function fetchMarketData() {
        const market = document.getElementById('market').value;
        let symbol = document.getElementById('symbol').value.trim().toUpperCase();
        const avKey = document.getElementById('av-key').value;
        const clKey = document.getElementById('cl-key').value;
        const status = document.getElementById('status');

        if (!symbol || !avKey) {
            status.innerText = "Error: Missing Symbol or AV Key";
            return;
        }

        status.innerText = "Fetching market data...";
        
        // Correct Suffix Mapping for Alpha Vantage
        let fullSymbol = symbol;
        if (market === "SG") fullSymbol = `${symbol}.SI`;
        if (market === "HK") fullSymbol = `${symbol}.HK`;

        const url = `https://www.alphavantage.co/query?function=GLOBAL_QUOTE&symbol=${fullSymbol}&apikey=${avKey}`;

        try {
            const resp = await fetch(url);
            const data = await resp.json();
            const quote = data["Global Quote"];

            if (!quote || !quote["05. price"]) {
                status.innerText = "Error: Stock not found or API limit reached.";
                return;
            }

            // Update UI
            document.getElementById('display-card').style.display = 'block';
            document.getElementById('disp-symbol').innerText = fullSymbol;
            document.getElementById('disp-price').innerText = Number(quote["05. price"]).toFixed(2);
            
            const rawChange = Number(quote["09. change"]);
            const pctChange = quote["10. change percent"];
            const isUp = rawChange >= 0;
            
            const changeEl = document.getElementById('disp-change');
            changeEl.innerText = `${isUp ? '+' : ''}${rawChange.toFixed(2)} (${pctChange})`;
            changeEl.style.color = isUp ? 'var(--up)' : 'var(--down)';

            status.innerText = `Updated ${new Date().toLocaleTimeString()}`;

            if (clKey) {
                getAISummary(quote, clKey);
            }
        } catch (e) {
            status.innerText = "Connection error.";
        }
    }

    async function getAISummary(q, key) {
        const aiWrap = document.getElementById('ai-wrap');
        const aiText = document.getElementById('disp-ai');
        aiWrap.style.display = 'block';
        aiText.innerText = "Consulting Claude...";

        const prompt = `Summarize market action for ${q["01. symbol"]} which closed at ${q["05. price"]} (${q["10. change percent"]} change). 
        Identify one specific driver from yesterday and one implication for a Singapore-based investor. 2 sentences total.`;

        try {
            const resp = await fetch('https://api.anthropic.com/v1/messages', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'x-api-key': key,
                    'anthropic-version': '2023-06-01',
                    'anthropic-dangerous-direct-browser-access': 'true'
                },
                body: JSON.stringify({
                    model: 'claude-3-haiku-20240307',
                    max_tokens: 150,
                    messages: [{ role: 'user', content: prompt }]
                })
            });
            const result = await resp.json();
            aiText.innerText = result.content[0].text;
        } catch (e) {
            aiText.innerText = "AI summary unavailable.";
        }
    }
</script>
</body>
</html>
